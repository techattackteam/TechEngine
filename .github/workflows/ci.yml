# TechEngine CI — the enforcement layer (ADR-008 §9). Nothing in ADR-008 is real
# unless a red check here blocks the merge.
#
# Legs (ADR-005/008): Win-MSVC + Linux-Clang, each {Debug, Release}; format on Linux;
# clang-tidy on the Linux leg; sanitizers per-PR (Option A) — ASan/Win, UBSan+TSan/Linux.
# Stage order per leg (fail cheap first): format/tidy -> build -> ctest (incl. sdk-smoke).
#
# NOTE: This workflow has NOT run yet — it is verified by its first PR, not locally.
# Branch protection (Dashboard task) makes these checks required once it's green.

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- cheapest gate first: formatting ---------------------------------------
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install clang-format==19.1.5
      - name: Check formatting
        run: |
          find engine apps sdk \( -name '*.cpp' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  # --- build + test on both legs x {Debug, Release} --------------------------
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "win-msvc Debug",      os: windows-2022, preset: windows,       build: windows-debug,          test: windows-debug,          tidy: "OFF" }
          - { name: "win-msvc Release",    os: windows-2022, preset: windows,       build: windows-release,        test: windows-release,        tidy: "OFF" }
          - { name: "linux-clang Debug",   os: ubuntu-latest,  preset: linux-debug,   build: linux-debug,   test: linux-debug,   tidy: "ON" }
          - { name: "linux-clang Release", os: ubuntu-latest,  preset: linux-release, build: linux-release, test: linux-release, tidy: "ON" }
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux toolchain + GLFW deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy \
            xorg-dev libgl1-mesa-dev   # GLFW X11/GL build deps

      - name: ccache
        if: runner.os == 'Linux'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.build }}

      # Share FetchContent downloads across runs (biggest cost is cloning deps).
      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('cmake/deps.cmake') }}

      - name: Configure
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps
        run: cmake --preset ${{ matrix.preset }} -DTE_ENABLE_CLANG_TIDY=${{ matrix.tidy }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build }}

      - name: Test (ctest incl. sdk-smoke)
        run: ctest --preset ${{ matrix.test }}

  # --- sanitizers, all per-PR (ADR-008 §9 Option A) --------------------------
  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "win ASan",    os: windows-2022, preset: windows-asan, build: windows-asan, test: windows-asan }
          - { name: "linux UBSan", os: ubuntu-latest,  preset: linux-ubsan,  build: linux-ubsan,  test: linux-ubsan }
          - { name: "linux TSan",  os: ubuntu-latest,  preset: linux-tsan,   build: linux-tsan,   test: linux-tsan }
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux toolchain + GLFW deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang xorg-dev libgl1-mesa-dev

      - name: ccache
        if: runner.os == 'Linux'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.build }}   # each sanitizer is its own cache namespace

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('cmake/deps.cmake') }}

      - name: Configure
        env:
          FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build }}

      - name: Test
        run: ctest --preset ${{ matrix.test }}
