# TechEngine CI — the enforcement layer (ADR-008 §9). Nothing in ADR-008 is real
# unless a red check here blocks the merge.
#
# Legs (ADR-005/008): Win-MSVC + Linux-Clang, each {Debug, Release}; format on Linux;
# clang-tidy on the Linux leg; sanitizers per-PR (Option A) — ASan/Win, UBSan+TSan/Linux.
# Stage order per leg (fail cheap first): format/tidy -> build -> ctest (incl. sdk-smoke).
#
# Caching: ccache caches BOTH our + dependency compilation on every leg, so pinned deps
# aren't rebuilt each run. ccache is a compiler *launcher*, which needs Ninja (the VS
# generator ignores it) — hence Ninja Multi-Config on Windows (ADR-008 §3 Amended) with
# /Z7 embedded debug info (compiler caches can't cache /Zi PDBs). ccache degrades to
# uncached compilation if its backend is down, so a cache outage never fails the build.
#
# NOTE: the ccache wiring is verified by its first PR run, not locally. The Ninja
# generator + MSVC flags themselves are verified locally.

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- cheapest gate first: formatting ---------------------------------------
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install clang-format==19.1.5
      - name: Check formatting
        run: |
          find engine apps sdk \( -name '*.cpp' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  # --- build + test on both legs x {Debug, Release} --------------------------
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "win-msvc Debug",      os: windows-2022,  preset: windows,       build: windows-debug,   test: windows-debug,   tidy: "OFF" }
          - { name: "win-msvc Release",    os: windows-2022,  preset: windows,       build: windows-release, test: windows-release, tidy: "OFF" }
          - { name: "linux-clang Debug",   os: ubuntu-latest, preset: linux-debug,   build: linux-debug,     test: linux-debug,     tidy: "ON" }
          - { name: "linux-clang Release", os: ubuntu-latest, preset: linux-release, build: linux-release,   test: linux-release,   tidy: "ON" }
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake + Ninja
        uses: lukka/get-cmake@latest

      # Ninja on Windows uses cl.exe from the MSVC environment; this puts it on PATH.
      - name: MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install clang + GLFW deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy \
            xorg-dev libgl1-mesa-dev libwayland-bin libwayland-dev libxkbcommon-dev

      # ccache degrades gracefully: a cold/unreachable cache just compiles slower,
      # it never fails a compile (unlike sccache-as-launcher gating on a live backend).
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.build }}

      # Share FetchContent downloads across runs (avoids re-cloning deps each run).
      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('cmake/deps.cmake') }}

      - name: Configure
        run: >
          cmake --preset ${{ matrix.preset }}
          -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps
          -DTE_ENABLE_CLANG_TIDY=${{ matrix.tidy }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_POLICY_DEFAULT_CMP0141=NEW
          -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded

      - name: Build
        run: cmake --build --preset ${{ matrix.build }}

      - name: Test (ctest incl. sdk-smoke)
        run: ctest --preset ${{ matrix.test }}

      - name: ccache stats
        run: ccache -s

  # --- sanitizers, all per-PR (ADR-008 §9 Option A) --------------------------
  sanitizers:
    name: ${{ matrix.name }}
    # PR-only (ADR-008 §9 Option A / ADR-009 §4): a squash-merge to master was already
    # sanitized on its up-to-date PR, so the push backstop skips the sanitizer trio.
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "win ASan",    os: windows-2022,  preset: windows-asan, build: windows-asan, test: windows-asan }
          - { name: "linux UBSan", os: ubuntu-latest, preset: linux-ubsan,  build: linux-ubsan,  test: linux-ubsan }
          - { name: "linux TSan",  os: ubuntu-latest, preset: linux-tsan,   build: linux-tsan,   test: linux-tsan }
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake + Ninja
        uses: lukka/get-cmake@latest

      # Also puts clang_rt.asan_dynamic-x86_64.dll on PATH so ASan exes start under ctest.
      - name: MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install clang + GLFW deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang \
            xorg-dev libgl1-mesa-dev libwayland-bin libwayland-dev libxkbcommon-dev

      # ccache degrades gracefully: a cold/unreachable cache just compiles slower,
      # it never fails a compile (unlike sccache-as-launcher gating on a live backend).
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.build }}

      - name: Cache FetchContent sources
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('cmake/deps.cmake') }}

      - name: Configure
        run: >
          cmake --preset ${{ matrix.preset }}
          -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DCMAKE_POLICY_DEFAULT_CMP0141=NEW
          -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded

      - name: Build
        run: cmake --build --preset ${{ matrix.build }}

      - name: Test
        run: ctest --preset ${{ matrix.test }}

      - name: ccache stats
        run: ccache -s
